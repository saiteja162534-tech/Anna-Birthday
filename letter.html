<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter To My Anna ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0a0a0a,#1b1b4d,#000);
color:white;
overflow-x:hidden;
text-align:center;
min-height:100vh;
}

/* Floating Hearts */

.heart{
position:fixed;
font-size:24px;
pointer-events:none;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Header */

.title{
font-size:60px;
color:gold;
margin-top:40px;
text-shadow:0 0 25px gold;
}

/* Letter Box */

.letter-box{

width:90%;
max-width:1000px;

margin:40px auto;

padding:40px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

border-radius:25px;

box-shadow:0 0 30px rgba(255,255,255,.15);

}

#letter{

font-size:24px;

line-height:2;

text-align:left;

white-space:pre-wrap;

}

/* Final Wish */

.final{

font-size:45px;

color:gold;

margin-top:40px;

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{
opacity:.7;
}

to{
opacity:1;
text-shadow:0 0 35px gold;
}

}

.footer{

font-size:28px;

color:#ff7eb3;

margin:40px;

}

/* Audio */

audio{
margin-top:20px;
width:80%;
max-width:500px;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:38px;
}

#letter{
font-size:18px;
}

.letter-box{
padding:20px;
}

.final{
font-size:28px;
}

.footer{
font-size:22px;
}

}

</style>
</head>
<body>

<audio autoplay controls loop>
<source src="emotional.mpeg" type="audio/mpeg">
</audio>

<h1 class="title">
💌 A Letter To My Anna 💌
</h1>

<div class="letter-box">

<div id="letter"></div>

</div>

<div class="final">

❤️ HAPPY BIRTHDAY ANNA ❤️

<br><br>

No Matter How Far You Are,

You Will Always Be In My Heart.

</div>

<div class="footer">

With Endless Love,

<br><br>

Your Little Brother Sai ❤️

</div>

<script>

/* Floating Hearts */

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration =
(6 + Math.random()*8) + "s";

heart.style.animationDelay =
Math.random()*5 + "s";

document.body.appendChild(heart);

}

/* Typewriter Letter */

const text = `

Happy Birthday Anna ❤️

Today is your special day.

While everyone celebrates your birthday with cakes, candles and wishes,
I wanted to give you something from my heart.

As I sit here writing this letter,
thousands of memories come rushing back.

Memories of our childhood.

Memories of our laughter.

Memories of the times we spent together.

Back then,
I never imagined there would be a day when you would be so far away.

Now you are in another country,
working hard,
building your future,
and chasing your dreams.

And Anna...

I am truly proud of you.

But at the same time,
I miss you more than I can explain.

I miss hearing your voice.

I miss talking to you face to face.

I miss our silly conversations.

I miss our laughter.

I miss the feeling of having you nearby.

Some days I look at our old photos and smile.

Other days those same photos make me emotional because they remind me how much I miss you.

You have always been more than a brother to me.

You were my protector.

You were my guide.

You were my teacher.

You were my inspiration.

And most importantly...

You were always there for me.

Thank you for every sacrifice you made.

Thank you for every lesson you taught me.

Thank you for every time you supported me.

Thank you for always believing in me.

Distance may separate us physically.

But distance can never separate our hearts.

No country.

No ocean.

No number of miles.

Can ever reduce the love and respect I have for you.

On your birthday,
I pray that happiness follows you wherever you go.

May success walk beside you.

May all your dreams come true.

May God bless you with good health,
peace,
joy,
and endless blessings.

And one day,

when we meet again,

we will create even more beautiful memories together.

Until that day comes,

please remember this:

You are loved.

You are appreciated.

You are missed.

Every single day.

❤️ Happy Birthday Anna ❤️

Forever Your Little Brother,

Sai ❤️

`;

let i = 0;

function typeWriter(){

if(i < text.length){

document.getElementById("letter").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,25);

}

}

typeWriter();

</script>

</body>
</html>
