<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Anna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#ff416c,
#ff4b2b,
#ff758c
);

position:relative;

}

/* Floating Lights */

.light{

position:absolute;

width:8px;
height:8px;

background:white;

border-radius:50%;

opacity:.7;

animation:float 10s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Main Card */

.card{

width:90%;
max-width:850px;

padding:60px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(12px);

border-radius:30px;

text-align:center;

box-shadow:
0 0 30px rgba(255,255,255,.2);

color:white;

z-index:2;

}

/* Title */

.title{

font-family:'Great Vibes',cursive;

font-size:90px;

margin-bottom:20px;

text-shadow:
0 0 20px rgba(255,255,255,.8);

}

/* Message */

.message{

font-size:28px;

line-height:1.8;

}

/* Button */

button{

margin-top:40px;

padding:18px 45px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:50px;

cursor:pointer;

background:white;

color:#ff416c;

transition:.4s;

}

button:hover{

transform:scale(1.08);

box-shadow:
0 0 25px white;

}

/* Date */

.date{

margin-top:30px;

font-size:24px;

font-weight:bold;

}

/* Mobile */

@media(max-width:768px){

.title{
font-size:55px;
}

.message{
font-size:18px;
}

button{
font-size:18px;
padding:15px 30px;
}

}

</style>
</head>
<body>

<div class="card">

<div class="title">
Happy Birthday Anna ❤️
</div>

<div class="message">

Wishing you happiness,

success,

love,

and endless joy on your special day.

<br><br>

A small surprise is waiting for you 🎁

</div>

<button onclick="window.location.href='memories.html'">

🎁 Open Surprise

</button>

<div class="date">

23 June 2026 🎂

</div>

</div>

<script>

/* Floating Lights */

for(let i=0;i<120;i++){

let light=document.createElement("div");

light.className="light";

light.style.left=Math.random()*100+"%";

light.style.animationDuration=
(5+Math.random()*10)+"s";

light.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(light);

}

</script>

</body>
</html>
