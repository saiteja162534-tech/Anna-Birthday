<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Anna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#dbeafe,
#e0f2fe,
#f8fafc,
#cbd5e1
);

position:relative;

}

/* Floating Circles */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.35);

animation:float 15s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Card */

.card{

width:90%;
max-width:900px;

padding:60px 30px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

border-radius:35px;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

z-index:5;

}

.title{

font-family:'Cormorant Garamond',serif;

font-size:90px;

color:#1e3a8a;

font-weight:600;

}

.anna{

font-family:'Alex Brush',cursive;

font-size:110px;

color:#2563eb;

margin-top:10px;

}

.subtitle{

margin-top:25px;

font-size:24px;

color:#475569;

line-height:1.8;

}

button{

margin-top:40px;

padding:18px 40px;

border:none;

border-radius:50px;

font-size:20px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#2563eb,
#38bdf8
);

color:white;

transition:.4s;

box-shadow:
0 10px 25px rgba(37,99,235,.25);

}

button:hover{

transform:translateY(-4px);

}

/* Mobile */

@media(max-width:768px){

.title{
font-size:55px;
}

.anna{
font-size:75px;
}

.subtitle{
font-size:18px;
}

button{
font-size:16px;
padding:14px 28px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="title">
Happy Birthday
</div>

<div class="anna">
Anna ❤️
</div>

<div class="subtitle">

A beautiful surprise is waiting for you 🎁

</div>

<button onclick="startExperience()">

🎁 Open Surprise

</button>

</div>

<script>

/* Floating Background */

for(let i=0;i<20;i++){

let circle=document.createElement("div");

circle.className="circle";

let size=Math.random()*100+30;

circle.style.width=size+"px";
circle.style.height=size+"px";

circle.style.left=Math.random()*100+"%";

circle.style.animationDuration=
(10+Math.random()*10)+"s";

circle.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(circle);

}

/* Open Page 2 */

function startExperience(){

localStorage.setItem(
"musicAllowed",
"true"
);

window.location.href=
"memories.html";

}

</script>

</body>
</html>
