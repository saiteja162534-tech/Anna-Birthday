<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Anna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(
135deg,
#c7d2fe,
#dbeafe,
#e0f2fe,
#f8fafc
);

min-height:100vh;

overflow-x:hidden;

}

/* PAGE */

.page{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.hidden{
display:none;
}

/* CARD */

.card,
.container{

width:95%;

max-width:1100px;

padding:40px;

text-align:center;

background:rgba(255,255,255,.45);

backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:
0 10px 30px rgba(0,0,0,.1);

}

/* TITLES */

.title,
.mem-title{

font-family:'Cormorant Garamond',serif;

font-size:70px;

color:#1e3a8a;

}

.anna,
.mem-anna{

font-family:'Alex Brush',cursive;

font-size:90px;

color:#2563eb;

}

.subtitle,
.mem-sub{

margin-top:20px;

font-size:22px;

color:#475569;

}

/* BUTTON */

button{

margin-top:35px;

padding:15px 35px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

background:
linear-gradient(
135deg,
#2563eb,
#38bdf8
);

color:white;

}

/* IMAGE */

.slideshow{

margin-top:30px;

}

.slideshow img{

width:100%;

max-width:800px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}

.caption{

margin-top:20px;

font-size:28px;

font-weight:600;

color:#2563eb;

}

.counter{

margin-top:10px;

font-size:18px;

color:#475569;

}

@media(max-width:768px){

.title,
.mem-title{
font-size:45px;
}

.anna,
.mem-anna{
font-size:65px;
}

.subtitle,
.mem-sub{
font-size:18px;
}

.caption{
font-size:20px;
}

}

</style>

</head>

<body>

<audio id="musicPlayer" preload="auto">
<source src="song1.mpeg" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<section id="page1" class="page">

<div class="card">

<div class="title">
Happy Birthday
</div>

<div class="anna">
Anna ❤️
</div>

<div class="subtitle">
A beautiful surprise is waiting for you 🎁
</div>

<button onclick="startExperience()">
🎁 Open Surprise
</button>

</div>

</section>

<!-- PAGE 2 -->

<section id="page2" class="page hidden">

<div class="container">

<div class="mem-title">
Beautiful Memories
</div>

<div class="mem-anna">
Anna ❤️
</div>

<div class="mem-sub">
Every picture holds a beautiful memory ✨
</div>

<div class="slideshow">

<img id="slide" src="img1.jpeg">

</div>

<div class="caption" id="caption">
👶 Childhood Pic
</div>

<div class="counter" id="counter">
1 / 13
</div>

</div>

</section>
<script>

const images=[

"img1.jpeg",
"img2.jpeg",
"img3.jpeg",
"img4.jpeg",
"img5.jpeg",
"img13.jpeg",
"img6.jpeg",
"img7.jpeg",
"img8.jpeg",
"img9.jpeg",
"img10.jpeg",
"img11.jpeg",
"img12.jpeg"

];

const captions=[

"👶 Childhood Pic",
"🧸 Beautiful Memories",
"🫂 Best Brother Forever",
"🎉 Happy Smiles",
"🥹 Unforgettable Memories",
"😎 Simple Yet Special",
"🥰 Dream Place",
"❤️ Precious Bond",
"🌟 Growing Together",
"🎊 Lovely Memories",
"✈️ Emotional Time",
"🤝 Blood ❤️",
"🎂 Happy Birthday Anna 👑"

];

const songs=[

"song1.mpeg",
"song2.mpeg"

];

const player =
document.getElementById("musicPlayer");

const slide =
document.getElementById("slide");

const caption =
document.getElementById("caption");

const counter =
document.getElementById("counter");

let current=0;
let currentSong=0;

/* START BUTTON */

function startExperience(){

document.getElementById("page1")
.classList.add("hidden");

document.getElementById("page2")
.classList.remove("hidden");

player.src=songs[0];

player.play().catch(error=>{

console.log(error);

});

startSlideshow();

}

/* SONG CHANGE */

player.addEventListener("ended",()=>{

currentSong++;

if(currentSong < songs.length){

player.src=songs[currentSong];

player.play().catch(()=>{});

}

});

/* SLIDESHOW */

function startSlideshow(){

const slideshow=setInterval(()=>{

current++;

if(current>=images.length){

clearInterval(slideshow);

showLetterPage();

return;

}

slide.style.opacity="0";

setTimeout(()=>{

slide.src=images[current];

caption.innerHTML=
captions[current];

counter.innerHTML=
(current+1)+" / "+images.length;

slide.style.opacity="1";

},500);

},5000);

}
  
/* =========================
LETTER PAGE
========================= */

function showLetterPage(){

document.getElementById("page2")
.classList.add("hidden");

document.getElementById("page3")
.classList.remove("hidden");

/* Emotional Song */

player.pause();

player.src="emotional.mpeg";

player.load();

player.play().catch(()=>{});

}

/* =========================
FIREWORKS
========================= */

const canvas=document.createElement("canvas");

canvas.id="fireworks";

canvas.style.position="fixed";
canvas.style.top="0";
canvas.style.left="0";
canvas.style.width="100%";
canvas.style.height="100%";
canvas.style.pointerEvents="none";
canvas.style.zIndex="999";

document.body.appendChild(canvas);

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

let fireworks=[];
let particles=[];

class Firework{

constructor(){

this.x=Math.random()*canvas.width;

this.y=canvas.height;

this.targetY=
Math.random()*(canvas.height/2);

this.speed=7;

this.color=
`hsl(${Math.random()*360},100%,60%)`;

}

update(){

this.y-=this.speed;

if(this.y<=this.targetY){

for(let i=0;i<40;i++){

particles.push(
new Particle(
this.x,
this.y,
this.color
));

}

return false;

}

return true;

}

draw(){

ctx.beginPath();

ctx.arc(
this.x,
this.y,
4,
0,
Math.PI*2
);

ctx.fillStyle=this.color;

ctx.fill();

}

}

class Particle{

constructor(x,y,color){

this.x=x;
this.y=y;

this.color=color;

this.angle=
Math.random()*Math.PI*2;

this.speed=
Math.random()*6+2;

this.life=80;

}

update(){

this.x+=
Math.cos(this.angle)*this.speed;

this.y+=
Math.sin(this.angle)*this.speed;

this.speed*=0.96;

this.life--;

return this.life>0;

}

draw(){

ctx.beginPath();

ctx.arc(
this.x,
this.y,
2,
0,
Math.PI*2
);

ctx.fillStyle=this.color;

ctx.fill();

}

}

function animate(){

requestAnimationFrame(animate);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

fireworks=
fireworks.filter(fw=>{

fw.draw();

return fw.update();

});

particles=
particles.filter(p=>{

p.draw();

return p.update();

});

}

setInterval(()=>{

if(
!document.getElementById("page3")
.classList.contains("hidden")
){

fireworks.push(
new Firework()
);

}

},700);

animate();

</script>

</body>
</html>
