<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Anna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#dbeafe,
#e0f2fe,
#f8fafc,
#cbd5e1
);

position:relative;

}

/* Floating Circles */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.4);

backdrop-filter:blur(5px);

animation:float 15s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

/* Main Card */

.card{

width:100%;
max-width:950px;

padding:70px 40px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

border-radius:40px;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

z-index:5;

}

/* Happy Birthday */

.happy{

font-family:'Cormorant Garamond',serif;

font-size:95px;

font-weight:600;

color:#1e3a8a;

line-height:1.1;

}

/* ANNA Font */

.anna{

font-family:'Alex Brush',cursive;

font-size:120px;

color:#1d4ed8;

margin-top:10px;

text-shadow:
0 5px 15px rgba(37,99,235,.25);

}

/* Subtitle */

.subtitle{

margin-top:25px;

font-size:24px;

line-height:1.8;

color:#475569;

}

/* Button */

button{

margin-top:40px;

padding:18px 42px;

border:none;

border-radius:50px;

font-size:20px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#2563eb,
#38bdf8
);

color:white;

box-shadow:
0 10px 25px rgba(37,99,235,.25);

transition:.4s;

}

button:hover{

transform:translateY(-5px);

}

/* Date */

.date{

margin-top:30px;

font-size:22px;

color:#334155;

font-weight:500;

}

/* Mobile */

@media(max-width:768px){

.happy{
font-size:55px;
}

.anna{
font-size:85px;
}

.subtitle{
font-size:18px;
}

button{
font-size:17px;
padding:15px 28px;
}

.date{
font-size:18px;
}

.card{
padding:45px 25px;
}

}

</style>

</head>
<body>

<div class="card">

<div class="happy">
Happy Birthday
</div>

<div class="anna">
Anna ❤️
</div>

<div class="subtitle">

Wishing you happiness,
success,
good health,
and endless joy on your special day.

<br><br>

A beautiful surprise is waiting for you 🎁

</div>

<button onclick="startExperience()">

🎁 Open Surprise

</button>

<div class="date">

23 June 2026 🎂

</div>

</div>

<script>

/* Mobile + PC Audio Permission */

function startExperience(){

const music=document.getElementById("startMusic");

/* Start Music On Mobile */

music.play().then(()=>{

localStorage.setItem("musicAllowed","true");

sessionStorage.setItem(
"currentSong",
"music/song1.mpeg"
);

window.location.href="memories.html";

}).catch(()=>{

window.location.href="memories.html";

});

}

/* Floating Background */

for(let i=0;i<25;i++){

let circle=document.createElement("div");

circle.className="circle";

let size=Math.random()*120+40;

circle.style.width=size+"px";
circle.style.height=size+"px";

circle.style.left=Math.random()*100+"%";

circle.style.animationDuration=
(10+Math.random()*15)+"s";

circle.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(circle);

}

</script>
  <audio id="startMusic" loop>
<source src="music/song1.mpeg" type="audio/mpeg">
</audio>

</body>
</html>
