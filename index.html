<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Anna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#fff6f0,
#ffe5ec,
#fbe7ff,
#fff1dc
);

position:relative;

}

/* Floating Circles */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.45);

backdrop-filter:blur(5px);

animation:float 15s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

/* Main Card */

.card{

width:90%;
max-width:850px;

padding:70px 50px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.6);

border-radius:35px;

text-align:center;

box-shadow:
0 15px 40px rgba(255,182,193,.25);

z-index:5;

}

/* Title */

.title{

font-family:'Great Vibes',cursive;

font-size:95px;

color:#d46a92;

margin-bottom:20px;

}

/* Subtitle */

.subtitle{

font-size:24px;

color:#7b5e70;

line-height:1.8;

font-weight:400;

}

/* Highlight */

.highlight{

color:#ff6f91;

font-weight:600;

}

/* Button */

button{

margin-top:45px;

padding:18px 42px;

border:none;

border-radius:50px;

font-size:20px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#ff8fab,
#ffc2d1
);

color:white;

box-shadow:
0 10px 25px rgba(255,143,171,.35);

transition:.4s;

}

button:hover{

transform:translateY(-5px) scale(1.03);

box-shadow:
0 18px 35px rgba(255,143,171,.45);

}

/* Date */

.date{

margin-top:35px;

font-size:22px;

color:#8a6572;

font-weight:500;

}

/* Small Hearts */

.heart{

position:absolute;

font-size:22px;

animation:heartFloat 10s linear infinite;

opacity:.7;

}

@keyframes heartFloat{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Mobile */

@media(max-width:768px){

.title{
font-size:60px;
}

.subtitle{
font-size:18px;
}

button{
font-size:17px;
padding:15px 28px;
}

.date{
font-size:18px;
}

.card{
padding:50px 25px;
}

}

</style>

</head>
<body>

<div class="card">

<div class="title">
Happy Birthday Anna ❤️
</div>

<div class="subtitle">

Wishing you a day filled with

<span class="highlight">love</span>,
<span class="highlight">happiness</span>,
and beautiful memories.

<br><br>

A little surprise is waiting for you ✨

</div>

<button onclick="window.location.href='memories.html'">

🎁 Open Surprise

</button>

<div class="date">

23 June 2026 🎂

</div>

</div>

<script>

/* Floating Elegant Circles */

for(let i=0;i<25;i++){

let circle=document.createElement("div");

circle.className="circle";

let size=Math.random()*120+40;

circle.style.width=size+"px";
circle.style.height=size+"px";

circle.style.left=Math.random()*100+"%";

circle.style.animationDuration=
(10+Math.random()*15)+"s";

circle.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(circle);

}

/* Floating Hearts */

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="🤍";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(8+Math.random()*10)+"s";

heart.style.animationDelay=
Math.random()*5+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
