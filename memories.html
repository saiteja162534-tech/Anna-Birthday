<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

overflow-y:auto;
overflow-x:hidden;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#dbeafe,
#e0f2fe,
#f8fafc,
#cbd5e1
);

position:relative;

}

/* Background Blur */

.blur{

pointer-events:none;

position:absolute;

border-radius:50%;

filter:blur(80px);

opacity:.4;

animation:move 10s infinite alternate;

}

.blur1{

width:320px;
height:320px;

background:#93c5fd;

top:-100px;
left:-100px;

}

.blur2{

width:320px;
height:320px;

background:#bae6fd;

bottom:-100px;
right:-100px;

}

@keyframes move{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* Main Container */

.container{

margin:30px 0;

width:100%;
max-width:1100px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(20px);

border-radius:35px;

padding:35px;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

z-index:5;

}

/* Title */

.title{

font-family:'Great Vibes',cursive;

font-size:75px;

color:#1e3a8a;

margin-bottom:15px;

}

/* Subtitle */

.subtitle{

font-size:22px;

color:#475569;

margin-bottom:30px;

line-height:1.7;

}

/* Slideshow */

.slideshow{

display:flex;

justify-content:center;

align-items:center;

}

/* Image */

.slideshow img{

width:100%;

max-width:500px;

height:auto;

max-height:75vh;

object-fit:contain;

background:white;

border-radius:25px;

padding:8px;

border:4px solid rgba(255,255,255,.8);

box-shadow:
0 10px 30px rgba(0,0,0,.15);

transition:1s;

}

/* Caption */

.caption{

margin-top:20px;

font-size:28px;

font-weight:600;

color:#1d4ed8;

}

/* Counter */

.counter{

margin-top:10px;

font-size:19px;

color:#475569;

}

/* Buttons */

.buttons{

margin-top:35px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:15px;

}

button{

padding:16px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#2563eb,
#38bdf8
);

color:white;

box-shadow:
0 10px 25px rgba(37,99,235,.25);

transition:.4s;

}

button:hover{

transform:translateY(-4px);

}

/* Audio */

audio{
display:none;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:55px;
}

.subtitle{
font-size:18px;
}

.caption{
font-size:22px;
}

.counter{
font-size:16px;
}

button{
font-size:16px;
padding:14px 28px;
}

.container{
padding:25px 18px;
}

.slideshow img{
max-height:65vh;
}

}

</style>
</head>
<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

<div class="title">
Our Memories ❤️
</div>

<div class="subtitle">

Every picture holds a beautiful memory ✨

</div>

<div class="slideshow">

<img id="slide" src="img1.jpeg">

</div>

<div class="caption" id="caption">

👶 Childhood Days

</div>

<div class="counter" id="counter">

1 / 12

</div>

<div class="buttons">

<button onclick="goBack()">

⬅ Back

</button>

<button onclick="goNext()">

💌 Next

</button>

</div>

</div>

<audio id="musicPlayer"></audio>

<script>

/* Images */

const images=[

"img1.jpeg",
"img2.jpeg",
"img3.jpeg",
"img4.jpeg",
"img5.jpeg",
"img6.jpeg",
"img7.jpeg",
"img8.jpeg",
"img9.jpeg",
"img10.jpeg",
"img11.jpeg",
"img12.jpeg"

];

/* Captions */

const captions=[

"👶 Childhood Days",
"🧸 Beautiful Memories",
"🏡 Family Moments",
"🎉 Happy Smiles",
"Uuforgotable Memories",
"😄 Dream Places",
"❤️ Precious Bond",
"🌟 Growing Together",
"🎊 Memories till my life",
"🤝  Dreams & Succes",
"✈️ My Inspiration More Than God",
"🎂 Happy Birthday ANNA"

];

/* Songs */

const songs=[

"song1.mpeg",
"song2.mpeg"

];

const slide=document.getElementById("slide");

const caption=document.getElementById("caption");

const counter=document.getElementById("counter");

/* Music */

const player=document.getElementById("musicPlayer");

let currentSong=0;

player.src=songs[currentSong];

player.play();

/* Continue Songs */

player.addEventListener("ended",()=>{

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

if(current<images.length-1){

player.src=songs[currentSong];

player.play();

}

});

/* Slideshow */

let current=0;

const slideshow=setInterval(()=>{

current++;

if(current>=images.length){

clearInterval(slideshow);

/* Stop Music */

player.pause();

player.currentTime=0;

/* Open Page 3 */

setTimeout(()=>{

window.location.href="letter.html";

},2500);

return;

}

slide.style.opacity=0;

setTimeout(()=>{

slide.src=images[current];

caption.innerHTML=captions[current];

counter.innerHTML=
(current+1)+" / "+images.length;

slide.style.opacity=1;

},400);

},5000);

/* Back */

function goBack(){

player.pause();

player.currentTime=0;

window.location.href="index.html";

}

/* Next */

function goNext(){

player.pause();

player.currentTime=0;

window.location.href="letter.html";

}

</script>

</body>
</html>
