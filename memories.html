<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

overflow:hidden;

background:
linear-gradient(
135deg,
#141e30,
#243b55,
#0f2027
);

display:flex;

justify-content:center;

align-items:center;

position:relative;

color:white;

}

/* Glow Background */

.glow{

position:absolute;

width:400px;
height:400px;

border-radius:50%;

background:rgba(255,255,255,.08);

filter:blur(100px);

animation:moveGlow 10s infinite alternate;

}

.glow:nth-child(1){
top:-100px;
left:-100px;
}

.glow:nth-child(2){
bottom:-100px;
right:-100px;
}

@keyframes moveGlow{

from{
transform:translateY(0px);
}

to{
transform:translateY(50px);
}

}

/* Main Container */

.container{

width:95%;
max-width:1200px;

text-align:center;

z-index:2;

}

/* Title */

.title{

font-family:'Cinzel',serif;

font-size:55px;

margin-bottom:20px;

text-shadow:
0 0 20px rgba(255,255,255,.7);

}

/* Slideshow */

.slideshow{

position:relative;

width:100%;

display:flex;

justify-content:center;

align-items:center;

}

/* Image */

.slideshow img{

width:400px;

height:650px;

max-width:90%;

object-fit:contain;

border-radius:25px;

border:5px solid rgba(255,255,255,.8);

background:black;

box-shadow:
0 0 25px rgba(255,255,255,.6),
0 0 50px rgba(255,215,0,.4);

transition:1s;

}

/* Caption */

.caption{

margin-top:25px;

font-size:28px;

font-weight:bold;

color:#ffe082;

}

/* Counter */

.counter{

margin-top:10px;

font-size:22px;

}

/* Buttons */

.buttons{

margin-top:35px;

}

button{

padding:16px 35px;

font-size:20px;

font-weight:bold;

border:none;

border-radius:50px;

cursor:pointer;

margin:10px;

background:white;

color:#243b55;

transition:.4s;

}

button:hover{

transform:scale(1.08);

box-shadow:
0 0 20px white;

}

/* Hidden Audio */

audio{
display:none;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:35px;
}

.slideshow img{
height:500px;
}

.caption{
font-size:22px;
}

.counter{
font-size:18px;
}

button{
font-size:16px;
padding:14px 28px;
}

}

</style>
</head>
<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<div class="title">
❤️ Our Beautiful Memories ❤️
</div>

<div class="slideshow">

<img id="slide" src="images/img1.jpeg">

</div>

<div class="caption" id="caption">

👶 Childhood Memories

</div>

<div class="counter" id="counter">

1 / 12

</div>

<div class="buttons">

<button onclick="goBack()">

⬅ Back

</button>

<button onclick="goNext()">

💌 Next

</button>

</div>

</div>

<audio id="musicPlayer"></audio>

<script>

/* Songs */

const songs = [

"music/song1.mpeg",
"music/song2.mpeg"

];

/* Images */

const images = [

"images/img1.jpeg",
"images/img2.jpeg",
"images/img3.jpeg",
"images/img4.jpeg",
"images/img5.jpeg",
"images/img6.jpeg",
"images/img7.jpeg",
"images/img8.jpeg",
"images/img9.jpeg",
"images/img10.jpeg",
"images/img11.jpeg",
"images/img12.jpeg"

];

/* Captions */

const captions = [

"👶 Childhood Memories",
"🧸 Little Brother Moments",
"🏠 Family Time",
"🎉 Happy Days",
"📚 School Memories",
"😄 Funny Moments",
"❤️ Precious Bond",
"🌟 Growing Together",
"🎊 Family Celebrations",
"🤝 My Hero Anna",
"✈️ Dreams Abroad",
"🎂 Happy Birthday Anna"

];

const slide = document.getElementById("slide");
const caption = document.getElementById("caption");
const counter = document.getElementById("counter");

/* Audio */

const player = document.getElementById("musicPlayer");

let currentSong = 0;

player.src = songs[currentSong];

player.play();

/* Loop Songs Until Images End */

player.addEventListener("ended",()=>{

currentSong++;

if(currentSong >= songs.length){

currentSong = 0;

}

if(current < images.length-1){

player.src = songs[currentSong];
player.play();

}

});

/* Slideshow */

let current = 0;

const slideshow = setInterval(()=>{

current++;

if(current >= images.length){

clearInterval(slideshow);

/* Stop Music After Last Image */

player.pause();
player.currentTime = 0;

setTimeout(()=>{

window.location.href="letter.html";

},3000);

return;

}

slide.src = images[current];

caption.innerHTML = captions[current];

counter.innerHTML =
(current+1)+" / "+images.length;

},6000);

/* Back */

function goBack(){

player.pause();

player.currentTime = 0;

window.location.href = "index.html";

}

/* Next */

function goNext(){

player.pause();

player.currentTime = 0;

window.location.href = "letter.html";

}

</script>

</body>
</html>
