<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beautiful Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

overflow-x:hidden;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#dbeafe,
#e0f2fe,
#f8fafc,
#cbd5e1
);

position:relative;

}

/* Blur Background */

.blur{

position:absolute;

border-radius:50%;

filter:blur(90px);

opacity:.35;

animation:move 10s infinite alternate;

}

.blur1{

width:350px;
height:350px;

background:#93c5fd;

top:-100px;
left:-100px;

}

.blur2{

width:350px;
height:350px;

background:#bae6fd;

bottom:-100px;
right:-100px;

}

@keyframes move{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* Main Box */

.container{

width:95%;
max-width:1300px;

padding:35px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

border-radius:35px;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

z-index:5;

}

/* Title */

.title{

font-family:'Cormorant Garamond',serif;

font-size:75px;

color:#1e3a8a;

font-weight:600;

}

.anna{

font-family:'Alex Brush',cursive;

font-size:90px;

color:#2563eb;

margin-top:5px;

}

/* Subtitle */

.subtitle{

margin-top:20px;

font-size:22px;

color:#475569;

margin-bottom:30px;

}

/* Image */

.slideshow{

display:flex;

justify-content:center;

align-items:center;

}

.slideshow img{

width:100%;

max-width:850px;

max-height:75vh;

object-fit:contain;

background:white;

padding:10px;

border-radius:25px;

border:4px solid rgba(255,255,255,.8);

box-shadow:
0 10px 30px rgba(0,0,0,.15);

transition:1s;

}

/* Caption */

.caption{

margin-top:20px;

font-size:28px;

font-weight:600;

color:#2563eb;

}

/* Counter */

.counter{

margin-top:10px;

font-size:18px;

color:#475569;

}

/* Buttons */

.buttons{

margin-top:35px;

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

button{

padding:16px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#2563eb,
#38bdf8
);

color:white;

transition:.4s;

box-shadow:
0 10px 25px rgba(37,99,235,.25);

}

button:hover{

transform:translateY(-4px);

}

audio{
display:none;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:50px;
}

.anna{
font-size:70px;
}

.subtitle{
font-size:18px;
}

.caption{
font-size:22px;
}

button{
font-size:16px;
padding:14px 28px;
}

.container{
padding:22px;
}

.slideshow img{
max-height:65vh;
}

}

</style>

</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

<div class="title">
Beautiful Memories
</div>

<div class="anna">
Anna ❤️
</div>

<div class="subtitle">

Every picture holds a beautiful memory ✨

</div>

<div class="slideshow">

<img id="slide" src="img1.jpeg">

</div>

<div class="caption" id="caption">

👶 Childhood Pic

</div>

<div class="counter" id="counter">

1 / 13

</div>

<div class="buttons">

<button onclick="goBack()">

⬅ Back

</button>

<button onclick="goNext()">

💌 Next

</button>

</div>

</div>

<audio id="musicPlayer"></audio>

<script>

/* Images */

const images=[

"img1.jpeg",
"img2.jpeg",
"img3.jpeg",
"img4.jpeg",
"img5.jpeg",
"img13.jpeg",
"img6.jpeg",
"img7.jpeg",
"img8.jpeg",
"img9.jpeg",
"img10.jpeg",
"img11.jpeg",
"img12.jpeg"

];

/* Captions */

const captions=[

"👶 Childhood Pic",
"🧸 Beautiful Memories",
"🫂 Best Brother Forever",
"🎉 Happy Smiles",
"🥹 Unforgettable Memories",
"😎 Simple Yet Special",
"🥰 Dream Place",
"❤️ Precious Bond",
"🌟 Growing Together",
"🎊 Lovely Memories",
"✈️ Emotional Time",
"🤝 Blood ❤️",
"🎂 Happy Birthday Anna 👑"

];

/* Songs */

const songs=[

"song1.mpeg",
"song2.mpeg"

];

const slide=document.getElementById("slide");

const caption=document.getElementById("caption");

const counter=document.getElementById("counter");

const player=document.getElementById("musicPlayer");

let current=0;

let currentSong=0;

/* =========================
   MOBILE + PC AUDIO FIX
========================= */

/* Start First Song */

player.src=songs[currentSong];

player.volume=1;

/* Force Mobile Playback */

document.body.addEventListener("click",startMusic,{once:true});

document.body.addEventListener("touchstart",startMusic,{once:true});

function startMusic(){

player.play().then(()=>{

console.log("Music Started");

}).catch((err)=>{

console.log(err);

});

}

/* =========================
   SONG LOOP
========================= */

player.addEventListener("ended",()=>{

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

if(current<images.length-1){

player.src=songs[currentSong];

player.play();

}

});

/* =========================
   SLIDESHOW
========================= */

const slideshow=setInterval(()=>{

current++;

if(current>=images.length){

clearInterval(slideshow);

/* Stop Music */

player.pause();

player.currentTime=0;

/* Open Page 3 */

setTimeout(()=>{

window.location.href="letter.html";

},2500);

return;

}

/* Fade */

slide.style.opacity=0;

setTimeout(()=>{

slide.src=images[current];

caption.innerHTML=captions[current];

counter.innerHTML=
(current+1)+" / "+images.length;

slide.style.opacity=1;

},400);

},5000);

/* =========================
   BACK BUTTON
========================= */

function goBack(){

player.pause();

player.currentTime=0;

window.location.href="index.html";

}

/* =========================
   NEXT BUTTON
========================= */

function goNext(){

player.pause();

player.currentTime=0;

window.location.href="letter.html";

}

</script>

</body>
</html>
