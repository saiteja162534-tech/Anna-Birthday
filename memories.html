<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#fff7f8,
#ffeef5,
#fdf0ff,
#fff8ee
);

position:relative;

}

/* Background Blur Shapes */

.blur{

position:absolute;

border-radius:50%;

filter:blur(80px);

opacity:.45;

animation:move 12s infinite alternate;

}

.blur1{

width:300px;
height:300px;

background:#ffc2d1;

top:-80px;
left:-80px;

}

.blur2{

width:350px;
height:350px;

background:#d8b4fe;

bottom:-100px;
right:-100px;

}

@keyframes move{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* Main Card */

.container{

width:92%;
max-width:1100px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(20px);

border-radius:35px;

padding:35px;

text-align:center;

box-shadow:
0 15px 40px rgba(255,182,193,.2);

z-index:5;

}

/* Title */

.title{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#d46a92;

margin-bottom:15px;

}

/* Subtitle */

.subtitle{

font-size:20px;

color:#866978;

margin-bottom:30px;

}

/* Slideshow */

.slideshow{

position:relative;

display:flex;

justify-content:center;

align-items:center;

}

/* Image */

.slideshow img{

width:380px;

height:580px;

object-fit:contain;

max-width:90%;

background:white;

border-radius:30px;

padding:10px;

box-shadow:
0 12px 30px rgba(255,182,193,.35);

transition:1s;

}

/* Caption */

.caption{

margin-top:20px;

font-size:26px;

font-weight:600;

color:#b76e79;

}

/* Counter */

.counter{

margin-top:10px;

font-size:18px;

color:#7d6b75;

}

/* Buttons */

.buttons{

margin-top:35px;

}

button{

padding:16px 35px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:600;

cursor:pointer;

margin:10px;

background:
linear-gradient(
135deg,
#ff8fab,
#ffc2d1
);

color:white;

box-shadow:
0 10px 25px rgba(255,143,171,.3);

transition:.4s;

}

button:hover{

transform:translateY(-4px);

}

/* Audio Hidden */

audio{
display:none;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:50px;
}

.subtitle{
font-size:17px;
}

.slideshow img{
height:480px;
}

.caption{
font-size:22px;
}

button{
font-size:16px;
padding:14px 28px;
}

}

</style>
</head>
<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

<div class="title">
Our Memories ❤️
</div>

<div class="subtitle">

Every picture holds a beautiful memory ✨

</div>

<div class="slideshow">

<img id="slide" src="images/img1.jpeg">

</div>

<div class="caption" id="caption">

👶 Childhood Days

</div>

<div class="counter" id="counter">

1 / 12

</div>

<div class="buttons">

<button onclick="goBack()">

⬅ Back

</button>

<button onclick="goNext()">

💌 Next

</button>

</div>

</div>

<audio id="musicPlayer"></audio>

<script>

/* Images */

const images=[

"images/img1.jpeg",
"images/img2.jpeg",
"images/img3.jpeg",
"images/img4.jpeg",
"images/img5.jpeg",
"images/img6.jpeg",
"images/img7.jpeg",
"images/img8.jpeg",
"images/img9.jpeg",
"images/img10.jpeg",
"images/img11.jpeg",
"images/img12.jpeg"

];

/* Captions */

const captions=[

"👶 Childhood Days",
"🧸 Beautiful Memories",
"🏡 Family Moments",
"🎉 Happy Smiles",
"📚 School Memories",
"😄 Fun Times",
"❤️ Precious Bond",
"🌟 Growing Together",
"🎊 Lovely Memories",
"🤝 My Inspiration",
"✈️ Dreams & Success",
"🎂 Happy Birthday Anna"

];

/* Songs */

const songs=[

"music/song1.mpeg",
"music/song2.mpeg"

];

const slide=document.getElementById("slide");
const caption=document.getElementById("caption");
const counter=document.getElementById("counter");

/* Music */

const player=document.getElementById("musicPlayer");

let currentSong=0;

player.src=songs[currentSong];

player.play();

/* Continue Songs Until Images End */

player.addEventListener("ended",()=>{

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

if(current<images.length-1){

player.src=songs[currentSong];
player.play();

}

});

/* Slideshow */

let current=0;

const slideshow=setInterval(()=>{

current++;

if(current>=images.length){

clearInterval(slideshow);

/* Stop Music */

player.pause();
player.currentTime=0;

/* Auto Move Page 3 */

setTimeout(()=>{

window.location.href="letter.html";

},2500);

return;

}

slide.style.opacity=0;

setTimeout(()=>{

slide.src=images[current];

caption.innerHTML=captions[current];

counter.innerHTML=
(current+1)+" / "+images.length;

slide.style.opacity=1;

},400);

},5000);

/* Back */

function goBack(){

player.pause();
player.currentTime=0;

window.location.href="index.html";

}

/* Next */

function goNext(){

player.pause();
player.currentTime=0;

window.location.href="letter.html";

}

</script>

</body>
</html>
